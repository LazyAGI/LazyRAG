name: Docker Release

on:
  push:
    branches:
      - main
      - cl/caoyangbo/build-ci
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.mdx"
      - ".agents/**"
      - "skills/**"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to backfill (for example v2026.3.22)
        required: true
        type: string
      service:
        description: JSON array of services to build (e.g. ["backend","frontend"] or ["all"])
        required: false
        default: '["all"]'
        type: string

concurrency:
  group: docker-release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # GitLab container registry host, defaults to registry.gitlab.com
  REGISTRY: ${{ vars.REGISTRY || 'registry.gitlab.com' }}
  # Namespace/repository path in GitLab registry (group/project)
  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE || github.repository }}

jobs:
  docker-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            dockerfile: backend/auth-service/Dockerfile
            context: backend
            image: auth-service
          - service: backend
            dockerfile: backend/core/Dockerfile
            context: backend
            image: backend
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
            image: frontend
          - service: mineru
            dockerfile: algorithm/Dockerfile
            context: algorithm
            target: mineru
            image: mineru
          - service: processor-server
            dockerfile: algorithm/Dockerfile
            context: algorithm
            target: default
            image: processor-server
          - service: processor-worker
            dockerfile: algorithm/Dockerfile
            context: algorithm
            target: default
            image: processor-worker
          - service: parsing
            dockerfile: algorithm/Dockerfile
            context: algorithm
            target: default
            image: parsing
          - service: chat
            dockerfile: algorithm/Dockerfile
            context: algorithm
            target: default
            image: chat
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive


      - name: Detect changed services
        id: changes
        shell: bash
        run: |
          set -e

          if [[ "${{ github.event_name }}" == "push" ]]; then
            git fetch origin main --depth=2
            CHANGED=$(git diff --name-only origin/main...HEAD)
          else
            CHANGED=""
          fi

          SERVICES=""

          [[ "$CHANGED" == *"backend/auth-service"* ]] && SERVICES="$SERVICES auth-service"
          [[ "$CHANGED" == *"backend/core"* ]] && SERVICES="$SERVICES backend"
          [[ "$CHANGED" == *"frontend"* ]] && SERVICES="$SERVICES frontend"
          [[ "$CHANGED" == *"algorithm"* ]] && SERVICES="$SERVICES mineru processor-server processor-worker parsing chat"

          echo "services=$SERVICES"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT


      - name: Evaluate service release rule
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          SELECTED_SERVICES: ${{ inputs.service }}
          CHANGED_SERVICES: ${{ steps.changes.outputs.services }}
          CURRENT_SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          should_build='false'

          if [[ "${EVENT_NAME}" == 'workflow_dispatch' ]]; then
            if jq -e --arg svc "${CURRENT_SERVICE}" 'index("all") != null or index($svc) != null' <<< "${SELECTED_SERVICES}" > /dev/null; then
              should_build='true'
            fi
          elif [[ "${REF_TYPE}" == 'tag' ]]; then
            should_build='true'
          elif [[ "${EVENT_NAME}" == 'push' && "${REF_TYPE}" != 'tag' ]]; then
            if [[ " ${CHANGED_SERVICES} " == *" ${CURRENT_SERVICE} "* ]]; then
              should_build='true'
            fi
          fi

          echo "should_build=${should_build}" >> "${GITHUB_OUTPUT}"


      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="main-${GITHUB_SHA::7}"
          fi
          echo "value=${TAG}" >> "${GITHUB_OUTPUT}"


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: ${{ steps.gate.outputs.should_build == 'true' }}


      - name: Login to Registry
        uses: docker/login-action@v3
        if: ${{ steps.gate.outputs.should_build == 'true' }}
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}


      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        if: ${{ steps.gate.outputs.should_build == 'true' }}
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64 
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}:latest
