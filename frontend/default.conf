server {
    listen 80;
    resolver 127.0.0.11 valid=10s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api {
        proxy_pass http://kong:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API docs (Swagger) from each service; frontend can resolve Docker service names
    location /api-docs/auth-service/ {
        proxy_pass http://auth-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api-docs/processor-server/ {
        proxy_pass http://processor-server:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api-docs/processor-worker/ {
        proxy_pass http://processor-worker:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api-docs/parsing/ {
        set $parsing_upstream parsing:8000;
        proxy_pass http://$parsing_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api-docs/chat/ {
        set $chat_upstream chat:8046;
        proxy_pass http://$chat_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}