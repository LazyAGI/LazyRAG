# Runtime model roles for LazyRAG.
# Fill in your own online provider config here. Real API keys should come from env vars.

llm:
  source: qwen
  type: llm
  model: ${EVO_MODEL_NAME:-qwen3-max}
  api_key: ${LAZYLLM_QWEN_API_KEY}

llm_instruct:
  source: qwen
  type: llm
  model: ${EVO_MODEL_NAME:-qwen3-max}
  api_key: ${LAZYLLM_QWEN_API_KEY}

evo_llm:
  source: openai
  type: llm
  model: ${MAAS_MODEL_NAME:-minimax-m27}
  url: ${MAAS_BASE_URL:-http://106.75.235.251:9000/v1/}
  api_key: ${LAZYRAG_MAAS_API_KEY}

evo_embed:
    source: qwen
    type: embed
    model: text-embedding-v3
    api_key: ${LAZYLLM_QWEN_API_KEY}
    index_kwargs:
      index_type: IVF_FLAT
      metric_type: COSINE
      params:
        nlist: 128

reranker:
  source: qwen
  type: rerank
  model: ${LAZYRAG_RERANK_MODEL:-qwen3-rerank}
  api_key: ${LAZYLLM_QWEN_API_KEY}
  timeout: ${LAZYRAG_RERANK_TIMEOUT:-60}

embeddings:
  embed_1:
    source: qwen
    type: embed
    model: text-embedding-v3
    api_key: ${LAZYLLM_QWEN_API_KEY}
    timeout: ${LAZYRAG_EMBED_TIMEOUT:-60}
    index_kwargs:
      index_type: IVF_FLAT
      metric_type: COSINE
      params:
        nlist: 128

  embed_2:
    source: qwen
    type: embed
    model: text-embedding-v2
    api_key: ${LAZYLLM_QWEN_API_KEY}
    timeout: ${LAZYRAG_EMBED_TIMEOUT:-60}

retrieval:
  temp_doc_embed_key: embed_1
  file_search_embed_key: embed_1
