# Runtime model config for online/cloud deployment using Qwen (Alibaba DashScope).
# All model roles are statically configured; API key is read from the environment.
# yaml key = AutoModel(model=...) lookup name; name field = actual model name sent to the API.

llm:
  - source: qwen
    name: qwen-plus

llm_instruct:
  - source: qwen
    name: qwen-plus

reranker:
  - source: qwen
    name: gte-rerank-v2

embed_main:
  - source: qwen
    name: text-embedding-v3

# Cross-modal (image) embed; used by image nodes and image-only retrieval branch.
embed_image:
  - source: qwen
    type: cross_modal_embed
    name: qwen2.5-vl-embedding
