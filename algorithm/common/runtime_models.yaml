# Runtime model roles for LazyMind (online/cloud deployment).
# Chat/rerank/embed roles use source=dynamic: model config is injected per-request via globals.config.

llm:
  source: dynamic
  dynamic_auth: true
  type: llm

evo_llm:
  source: dynamic
  dynamic_auth: true
  type: llm

reranker:
  source: dynamic
  dynamic_auth: true
  type: rerank

embed_main:
  source: dynamic
  dynamic_auth: true
  type: embed

# Cross-modal (image) embed; used by image nodes and image-only retrieval branch.
embed_image:
  - source: qwen
    type: cross_modal_embed
    name: qwen2.5-vl-embedding

vlm:
  source: dynamic
  dynamic_auth: true
  type: vlm
