# Runtime model config for online/cloud deployment using Minimax.
# All model roles are statically configured; API key is read from the environment.
# yaml key = AutoModel(model=...) lookup name; name field = actual model name sent to the API.

llm:
  - source: openai
    name: minimax-m27
    url: http://106.75.235.251:9000/v1/
    api_key: ${LAZYLLM_MINIMAX_API_KEY}

llm_instruct:
  - source: openai
    name: minimax-m27
    url: http://106.75.235.251:9000/v1/
    api_key: ${LAZYLLM_MINIMAX_API_KEY}

evo_llm:
  - source: openai
    name: minimax-m27
    url: http://106.75.235.251:9000/v1/
    api_key: ${LAZYLLM_MINIMAX_API_KEY}

evo_embed:
  - source: qwen
    name: text-embedding-v3

reranker:
  - source: qwen
    name: gte-rerank-v2

embed_main:
  - source: qwen
    name: text-embedding-v3
