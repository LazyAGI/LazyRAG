    name: minimax-m27
    url: http://172.24.176.1:39090/v1/
    api_key: sk-maas-GDZmEQsilc4uGXXTaWnIHmET9V0eenZ8F6eWk3LaPzE

llm_instruct:
  - source: openai
    type: llm
    name: lazyllm
    url: http://172.24.176.1:38000/v1/
    skip_auth: true

reranker:
  - source: qwen3rerank
    type: rerank
    name: Qwen3-Reranker-8B
    url: http://172.24.176.1:38331/v1/rerank
    skip_auth: true

embed_main:
  - source: bgem3embed
    type: embed
    name: bgem3_emb_dense_custom
    url: http://172.24.176.1:32269/embed
    skip_auth: true

