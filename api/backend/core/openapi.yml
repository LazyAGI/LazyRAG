# OpenAPI 3.0 placeholder for backend core (Go).
# Routes and permissions are registered in backend/core; api_permissions.json
# is generated by scripts/extract_api_permissions.py for Kong RBAC.
openapi: 3.0.3
info:
  title: Backend Core API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/hello:
    get:
      summary: Hello (requires user.read)
      responses:
        '200':
          description: OK
  /api/admin:
    get:
      summary: Admin (requires document.write)
      responses:
        '200':
          description: OK
